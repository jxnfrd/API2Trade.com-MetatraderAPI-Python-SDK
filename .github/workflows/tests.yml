name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check import (smoke test)
        run: |
          python -c "
          from api2trade_sdk import Api2TradeClient, OrderType, RetCode
          from api2trade_sdk.exceptions import BrokerRejectionError
          from api2trade_sdk.models import AccountSummary, Quote, Position
          print('✅ All imports OK')
          "
